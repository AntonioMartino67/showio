name: Sync Cron

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama endpoint di sync
        run: |
          curl -X POST https://showio.onrender.com/cron/sync-all \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"