<div class="auth-page">
  <div class="auth-card">
    <h1>Showio</h1>
    <p class="subtitle">Accedi al tuo account</p>

    <div id="google-btn" class="google-btn-wrap"></div>
    <div class="divider"><span>oppure</span></div>

    <form (ngSubmit)="submit()">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required />

      <label>Password</label>
      <app-password-input [(ngModel)]="password" name="password" />

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Accesso...' : 'Accedi' }}
      </button>
    </form>

    <p class="link">Non hai un account? <a routerLink="/register">Registrati</a></p>
  </div>
</div>
