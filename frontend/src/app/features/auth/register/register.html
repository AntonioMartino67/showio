<div class="auth-page">
  <form class="auth-card" (ngSubmit)="submit()">
    <h1>Showio</h1>
    <p class="subtitle">Crea un nuovo account</p>

    <div id="google-btn" class="google-btn-wrap"></div>
    <div class="divider"><span>oppure</span></div>

    <label>Username</label>
    <input type="text" [(ngModel)]="username" name="username" required />

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" required />

    <label>Password</label>
    <app-password-input [(ngModel)]="password" name="password" />

    <label>Conferma Password</label>
    <app-password-input [(ngModel)]="confirmPassword" name="confirmPassword" />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Registrazione...' : 'Registrati' }}
    </button>

    <p class="link">Hai già un account? <a routerLink="/login">Accedi</a></p>
  </form>
</div>
