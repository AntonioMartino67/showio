<div class="page">
  <nav class="navbar">
    <span class="logo">Showio</span>
    <div class="nav-links">
      <a routerLink="/dashboard">La mia lista</a>
      <a routerLink="/search" class="active">Cerca</a>
      <a routerLink="/calendar">Calendario</a>
    </div>
  </nav>

  <div class="content">
    <form class="search-bar" (ngSubmit)="submit()">
      <input type="text" [(ngModel)]="query" name="query" placeholder="Cerca film, serie, anime..." />
      <button type="submit">Cerca</button>
    </form>

    @if (loading()) {
        <div class="grid">
          @for (i of skeletonItems; track i) {
            <div class="card skeleton-card">
              <div class="skeleton-poster"></div>
              <div class="card-body">
                <div class="skeleton-line skeleton-title"></div>
                <div class="skeleton-line skeleton-sub"></div>
              </div>
            </div>
          }
        </div>
      } @else if (results().length > 0) {
      <div class="grid">
        @for (item of results(); track item.media_item_id) {
          <div class="card" [routerLink]="['/media', item.media_item_id]">            @if (item.poster_url) {
              <img [src]="(item.source === 'tmdb' ? 'https://image.tmdb.org/t/p/w300' : '') + item.poster_url" [alt]="item.title" />
            } @else {
              <div class="no-poster">{{ item.title }}</div>
            }
            <div class="card-body">
              <h3>{{ item.title }}</h3>
              <span class="source">{{ item.source }} · {{ item.type }}</span>
              <button [disabled]="isAdded(item)" (click)="$event.stopPropagation(); add(item)">
                {{ isAdded(item) ? 'Aggiunto ✓' : 'Aggiungi' }}
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
