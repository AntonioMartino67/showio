<div class="page">
  <app-navbar />
  <div class="content">
    <h2>Profilo</h2>
    @if (auth.currentUser(); as user) {
      <div class="profile-card">
        @if (user.avatar_url) {
          <img class="avatar-preview" [src]="user.avatar_url" alt="avatar" />
        }
        <div class="row"><span class="label">Username</span><span>{{ user.username }}</span></div>
        <div class="row"><span class="label">Email</span><span>{{ user.email }}</span></div>
      </div>

      <div class="profile-card avatar-form">
        <label class="label">URL avatar</label>
        <input type="text" [(ngModel)]="avatarUrl" placeholder="https://esempio.com/immagine.jpg" />
        <button (click)="saveAvatar()" [disabled]="saving()">{{ saving() ? 'Salvo...' : 'Salva avatar' }}</button>
        @if (message()) {
          <p class="msg" [class.error]="isError()">{{ message() }}</p>
        }
      </div>

      <div class="profile-card avatar-form">
        <label class="label">{{ user.has_password ? 'Cambia password' : 'Imposta una password' }}</label>

        @if (user.has_password) {
          <app-password-input [(ngModel)]="currentPassword" name="currentPassword" placeholder="Password attuale" />
        }
        <app-password-input [(ngModel)]="newPassword" name="newPassword" placeholder="Nuova password" />
        <app-password-input [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Conferma nuova password" />

        <button (click)="changePassword()" [disabled]="pwSaving()">
          {{ pwSaving() ? 'Salvo...' : (user.has_password ? 'Aggiorna password' : 'Imposta password') }}
        </button>

        @if (pwMessage()) {
          <p class="msg" [class.error]="pwIsError()">{{ pwMessage() }}</p>
        }
      </div>
    }
  </div>
</div>
